[nosetests]
verbosity=2
with-spec=1
spec-color=1
with-coverage=1
cover-package=service
cover-erase=1
cover-min-percentage=95

[coverage:report]
show_missing = True

[flake8]
max-line-length = 127
max-complexity = 10
exclude = .git, __pycache__, .tox, .eggs, *.egg

[pylint]
max-line-length = 127
disable = C0103,C0114,C0115,C0116,R0903,W0212
